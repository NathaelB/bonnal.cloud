apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bonnal-cloud
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nathaelb/bonnal.cloud
    targetRevision: HEAD
    path: helm
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: bonnal
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
