{{- if .Values.ingress.enabled }}
{{- range $name, $app := .Values.apps }}
{{- if and ($app.enabled | default true) $app.ingress.host }}
{{- $ctx := dict "root" $ "name" $name "app" $app }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "bonnal-cloud.appFullname" $ctx }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "bonnal-cloud.appLabels" $ctx | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: {{ $.Values.ingress.clusterIssuer }}
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    {{- with $.Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ $.Values.ingress.className }}
  tls:
    - secretName: {{ include "bonnal-cloud.appFullname" $ctx }}-tls
      hosts:
        - {{ $app.ingress.host | quote }}
  rules:
    - host: {{ $app.ingress.host | quote }}
      http:
        paths:
          - path: {{ $.Values.ingress.path }}
            pathType: {{ $.Values.ingress.pathType }}
            backend:
              service:
                name: {{ include "bonnal-cloud.appFullname" $ctx }}
                port:
                  name: http
{{- end }}
{{- end }}
{{- end }}
