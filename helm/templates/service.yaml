{{- range $name, $app := .Values.apps }}
{{- if ($app.enabled | default true) }}
{{- $ctx := dict "root" $ "name" $name "app" $app }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "bonnal-cloud.appFullname" $ctx }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "bonnal-cloud.appLabels" $ctx | nindent 4 }}
spec:
  type: {{ $.Values.service.type }}
  selector:
    {{- include "bonnal-cloud.appSelectorLabels" $ctx | nindent 4 }}
  ports:
    - name: http
      port: {{ $.Values.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
{{- end }}
